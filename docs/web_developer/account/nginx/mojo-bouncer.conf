# ─────────────────────────────────────────────────────────────────────────────
# mojo-bouncer.conf — drop-in nginx include for bouncer-gated locations
# ─────────────────────────────────────────────────────────────────────────────
#
# Purpose:
#   Adds two server-level locations that let `auth_request` directives gate
#   any location through the django-mojo bouncer. One line in the consuming
#   block (`auth_request /_mojo_bouncer_check;`) puts a location behind the
#   bouncer's signature cache + mbp-cookie pre-screen.
#
# Required variables in the consuming server { } block:
#   set $mojo_bouncer_host  "auth.example.com";   # bouncer host (no scheme)
#   set $mojo_bouncer_login "/auth";              # bouncer login path
#
# Usage in a server { } block:
#   server {
#       server_name app.example.com;
#       set $mojo_bouncer_host  "auth.example.com";
#       set $mojo_bouncer_login "/auth";
#       include conf.d/mojo-bouncer.conf;
#
#       location /vip/ {
#           auth_request /_mojo_bouncer_check;
#           error_page 401 = @mojo_bouncer_redirect;
#           try_files $uri $uri/ /index.html;
#       }
#   }
#
# Deployment shapes supported (v1):
#   A — Same domain: app and bouncer share a host. Cookies travel naturally.
#   B — Subdomains: app at app.example.com, bouncer at auth.example.com.
#       Set BOUNCER_PASS_COOKIE_DOMAIN=.example.com in Django settings so the
#       mbp cookie is shared.
#
# Not supported in v1: separate eTLD+1 (Shape C). Browser cookie policy blocks
# this — would require a signed-token redirect dance. Filed as future work.
#
# Edge-block behavior:
#   verify_pass consults the bouncer signature cache first; known-bot IPs/UAs
#   get 401 with `X-Bouncer-Reason: signature` without the cookie ever being
#   checked. nginx then redirects to the bouncer challenge page (which serves
#   the decoy for matched signatures).

location = /_mojo_bouncer_check {
    internal;
    proxy_pass         https://$mojo_bouncer_host/api/account/bouncer/verify_pass;
    proxy_set_header   Host         $mojo_bouncer_host;
    proxy_set_header   Cookie       $http_cookie;
    proxy_set_header   X-Real-IP    $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   User-Agent   $http_user_agent;
    proxy_pass_request_body off;
    proxy_set_header   Content-Length "";

    # Short timeouts — verify_pass is cookie + Redis only, sub-50ms typical.
    proxy_connect_timeout 2s;
    proxy_send_timeout    2s;
    proxy_read_timeout    2s;
}

location @mojo_bouncer_redirect {
    return 302 https://$mojo_bouncer_host$mojo_bouncer_login?redirect=$scheme://$host$request_uri;
}
