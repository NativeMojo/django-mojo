# ─────────────────────────────────────────────────────────────────────────────
# example-protected-site.conf — complete worked example
# ─────────────────────────────────────────────────────────────────────────────
#
# Static site at app.example.com fronted by nginx. Some locations are public
# (homepage, marketing pages), some are behind the bouncer (VIP, dashboard,
# anything sensitive). The bouncer is hosted at auth.example.com.
#
# Both hosts share the parent domain example.com — set
# BOUNCER_PASS_COOKIE_DOMAIN=.example.com on the bouncer side so the mbp
# cookie issued by /auth is also sent on requests to app.example.com.

server {
    listen 443 ssl http2;
    server_name app.example.com;

    # ssl_certificate / ssl_certificate_key as usual for your host

    # Shared bouncer plumbing
    set $mojo_bouncer_host  "auth.example.com";
    set $mojo_bouncer_login "/auth";
    include conf.d/mojo-bouncer.conf;

    root /var/www/app.example.com;
    index index.html;

    # ── Protected: VIP area — every request gated through the bouncer ──
    location /vip/ {
        auth_request /_mojo_bouncer_check;
        error_page 401 = @mojo_bouncer_redirect;
        try_files $uri $uri/ /vip/index.html;
    }

    # ── Protected: account dashboard ──
    location /dashboard/ {
        auth_request /_mojo_bouncer_check;
        error_page 401 = @mojo_bouncer_redirect;
        try_files $uri $uri/ /dashboard/index.html;
    }

    # ── Protected: form pages that POST to the API ──
    # The form page itself is bouncer-gated. Form submission carries
    # bouncer_token (issued by mojo-bouncer.js running on the page) and the
    # API endpoint validates it via @md.requires_bouncer_token.
    location = /support/ticket {
        auth_request /_mojo_bouncer_check;
        error_page 401 = @mojo_bouncer_redirect;
        try_files /support/ticket.html =404;
    }

    # ── Public: everything else (marketing, robots.txt, etc.) ──
    location / {
        try_files $uri $uri/ /index.html;
    }
}
