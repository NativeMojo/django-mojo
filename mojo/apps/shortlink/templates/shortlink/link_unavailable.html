<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Link unavailable</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      max-width: 440px;
      width: 100%;
      padding: 2.5rem 2rem;
      text-align: center;
    }
    .brand {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #9ca3af;
      margin-bottom: 1.25rem;
    }
    .icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #f3f4f6;
      color: #6b7280;
      margin-bottom: 1.25rem;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 0.9375rem;
      color: #555;
      line-height: 1.5;
    }
    .btn {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.625rem 1.5rem;
      border-radius: 6px;
      font-size: 0.9375rem;
      font-weight: 500;
      text-decoration: none;
      background: #f3f4f6;
      color: #374151;
    }
    .btn:hover { background: #e5e7eb; }
  </style>
</head>
<body>
  <div class="card">

    {% if site_name %}<span class="brand">{{ site_name }}</span>{% endif %}

    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="none"
           viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M13.828 10.172a4 4 0 0 0-5.656 0l-3 3a4 4 0 1 0 5.656 5.656l1.5-1.5"/>
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M10.172 13.828a4 4 0 0 0 5.656 0l3-3a4 4 0 1 0-5.656-5.656l-1.5 1.5"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 4l16 16"/>
      </svg>
    </div>

    <h1>This link is no longer available</h1>

    <p>It may have expired, or it may never have existed.<br>
    If someone sent you this link, ask them for a new one.</p>

    {% if home_url %}
      <a href="{{ home_url }}" class="btn">Back to {{ site_name|default:"site" }}</a>
    {% endif %}

  </div>
</body>
</html>
