site_name: Django-MOJO
site_description: The Lightweight, Secure, and Extensible REST and Auth Framework for Django
site_url: https://NativeMojo.github.io/django-mojo/
repo_url: https://github.com/NativeMojo/django-mojo
repo_name: NativeMojo/django-mojo
edit_uri: edit/main/docs/

theme:
    name: material
    palette:
        - scheme: default
          primary: indigo
          accent: indigo
          toggle:
              icon: material/brightness-7
              name: Switch to dark mode
        - scheme: slate
          primary: indigo
          accent: indigo
          toggle:
              icon: material/brightness-4
              name: Switch to light mode
    features:
        - navigation.tabs
        - navigation.sections
        - navigation.expand
        - navigation.top
        - search.highlight
        - search.suggest
        - content.code.copy

markdown_extensions:
    - pymdownx.highlight:
          anchor_linenums: true
    - pymdownx.superfences
    - pymdownx.inlinehilite
    - pymdownx.tabbed:
          alternate_style: true
    - admonition
    - pymdownx.details
    - tables
    - toc:
          permalink: true

